<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket</title>
    <link rel="stylesheet" href="output.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>
<body class="bg-slate-100 flex flex-row">
    <aside class="min-h-screen max-w-md min-w-sm border-r border-r-slate-300  bg-white flex flex-col justify-between">
        <section class="p-10">
            <div class="flex flex-row items-center justify-start gap-2 mb-5">
                <span class="material-symbols-outlined" style="font-size: 48px;">local_activity</span>
                <h1 class="text-4xl font-bold">Ticket</h1>
            </div>
            <ul class="flex flex-col gap-3 items-start justify-center">
                <a href="" class="text-lg text-slate-600 rounded-xl w-full px-4 py-2 flex items-center gap-2 hover:bg-slate-100 hover:text-slate-950 active:text-blue-600"><span class="material-symbols-outlined">service_toolbox</span>Open Tickets</a>
                <a href="" class="text-lg text-slate-600 rounded-xl w-full px-4 py-2 flex items-center gap-2 hover:bg-slate-100 hover:text-slate-950 active:text-blue-600"><span class="material-symbols-outlined">category_search</span>My Queue</a>
                <a href="" class="text-lg text-slate-600 rounded-xl w-full px-4 py-2 flex items-center gap-2 hover:bg-slate-100 hover:text-slate-950 active:text-blue-600"><span class="material-symbols-outlined">analytics</span>Analytics</a>
            </ul>
        </section>
        <section class="w-full border-t border-slate-300 p-5 flex flex-row items-center justify-start">
            <div class="mr-2 text-4xl">
                <span class="material-symbols-outlined" style="font-size: 36px;">account_circle</span>
            </div>
            <div>
                <p class="text-xl font-bold">John Doe</p>
                <span class="text-slate-500">System Admin</span>
            </div>
        </section>
    </aside>
    <div class="flex flex-col w-full">
        <header class="w-full bg-white h-16 relative flex flex-row items-center justify-around p-2">
            <div class="w-2/5 relative">
                <span class="material-symbols-outlined absolute top-2 left-2 text-slate-400">search</span>
                <input type="search" name="" id="" class="border border-slate-200 w-2/3 rounded-lg p-2 bg-slate-100 pl-10 active::border-slate-300">
            </div>
            <div class="static flex flex-row items-center justify-center gap-5">
                <button class="border-r-2 border-r-slate-200 flex items-center px-4"><span class="material-symbols-outlined text-slate-400" style="font-size: 26px;">notifications</span></button>
                <button class="bg-blue-600 px-4 py-3 gap-2 text-white flex flex-row items-center rounded-xl hover:bg-blue-500"><span class="material-symbols-outlined">add</span>New Ticket</button>
            </div>
        </header>
    </div>
</body>
</html>
